<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-3 fixed-top">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link active" href="index.html">Home</a>
                </div>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="cart.html">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                            class="bi bi-cart4" viewBox="0 0 16 16">
                            <path
                                d="M0 2.5A.5.5 0 0 1 .5 2H2a.5.5 0 0 1 .485.379L2.89 4H14.5a.5.5 0 0 1 .485.621l-1.5 6A.5.5 0 0 1 13 11H4a.5.5 0 0 1-.485-.379L1.61 3H.5a.5.5 0 0 1-.5-.5M3.14 5l.5 2H5V5zM6 5v2h2V5zm3 0v2h2V5zm3 0v2h1.36l.5-2zm1.11 3H12v2h.61zM11 8H9v2h2zM8 8H6v2h2zM5 8H3.89l.5 2H5zm0 5a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0m9-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0" />
                        </svg>

                        <span class="badge bg-danger" id="quantity"></span>
                    </a>
                </div>
    
            </div>
        </div>
    </nav>
    <br><br>
    <div class="container mt-5">
        <div class="row gy-3">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>სახელი</th>
                        <th>ფასი</th>
                        <th>რაოდენობა</th>
                        <th>ქმედება</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        function loadQuantity() {
            fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll").then(function(response) {
                return response.json()
            }).then(function(data) {
                document.getElementById("quantity").textContent = data.length;
            })
        }

        loadQuantity();

        fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll").then(function(response) {
            return response.json()
        }).then(function(products) {
            products.map(function(product, index) {
                var td1 = document.createElement("td");
                td1.textContent = (index + 1);

                var td2 = document.createElement("td");
                td2.textContent = product.product.name;

                var img = document.createElement("img");
                img.src = product.product.image;
                img.className = "img-thumbnail rounded-5"
                img.style.width = "50px";
                img.style.marginLeft = "20px"

                td2.appendChild(img);

                var td3 = document.createElement("td");
                td3.textContent = product.product.price + "₾";

                var td4 = document.createElement("td");
                td4.textContent = product.quantity;

                var deleteBtn = document.createElement("button")
                deleteBtn.className = "btn btn-danger";
                
                var i = document.createElement("i")
                i.className = "fa fa-trash";

                deleteBtn.appendChild(i)

                deleteBtn.onclick = function() {
                    var _this_ = this;
                    axios.delete("https://restaurant.stepprojects.ge/api/Baskets/DeleteProduct/" + product.product.id).then(function(response) {
                        _this_.parentElement.parentElement.remove()
                        loadQuantity();
                    }).catch(function(err) {
                        console.log(err);
                    })
                }

                var td5 = document.createElement("td");
                td5.appendChild(deleteBtn);

                var tr = document.createElement("tr");

                tr.appendChild(td1)
                tr.appendChild(td2)
                tr.appendChild(td3)
                tr.appendChild(td4)
                tr.appendChild(td5)

                document.getElementsByTagName("tbody")[0].appendChild(tr)
            });
        })
    </script>
</body>
</html>
