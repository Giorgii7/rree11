<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: #f3f3f3;
            animation: fadeIn 1s ease;
        }

        /* NAVBAR */
        .navbar {
            animation: slideDown 0.8s ease;
        }

        /* CARD (scroll animation) */
        .card {
            opacity: 0;
            transform: translateY(60px);
            transition: all 0.6s ease;
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* HOVER */
        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* BUTTON */
        .btn {
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        /* BADGE */
        #quantity {
            animation: pop 0.5s ease;
        }

        /* KEYFRAMES */
        @keyframes fadeIn {
            from {opacity:0;}
            to {opacity:1;}
        }

        @keyframes slideDown {
            from {transform: translateY(-100%);}
            to {transform: translateY(0);}
        }

        @keyframes pop {
            0% {transform: scale(0);}
            100% {transform: scale(1);}
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-3 fixed-top">
    <div class="container">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <div class="navbar-nav">
                <a class="nav-link active" href="index.html">Home</a>
            </div>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="cart.html">
                    🛒
                    <span class="badge bg-danger" id="quantity"></span>
                </a>
            </div>
        </div>
    </div>
</nav>

<br><br>

<!-- PRODUCTS -->
<div class="container mt-5">
    <div class="row gy-3" id="products"></div>
</div>

<script>

/* რაოდენობა */
function loadQuantity() {
    fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll")
    .then(res => res.json())
    .then(data => {
        document.getElementById("quantity").textContent = data.length;
    });
}

loadQuantity();

/* პროდუქტები */
fetch("https://restaurant.stepprojects.ge/api/Products/GetAll")
.then(res => res.json())
.then(products => {

    products.forEach(product => {

        let col = document.createElement("div");
        col.className = "col-md-3 col-12";

        let card = document.createElement("div");
        card.className = "card";

        let img = document.createElement("img");
        img.src = product.image;
        img.className = "w-100";

        let body = document.createElement("div");
        body.className = "card-body";

        let name = document.createElement("h5");
        name.textContent = product.name;

        let price = document.createElement("p");
        price.innerHTML = "<b class='badge bg-secondary'>" + product.price + "₾</b>";

        let btn = document.createElement("button");
        btn.className = "btn btn-primary w-100";
        btn.textContent = "კალათაში დამატება";

        /* CLICK ANIMATION */
        btn.onclick = function () {

            btn.innerText = "✔ დამატებულია";
            btn.style.background = "green";

            setTimeout(() => {
                btn.innerText = "კალათაში დამატება";
                btn.style.background = "";
            }, 1500);

            fetch("https://restaurant.stepprojects.ge/api/Baskets/AddToBasket", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    quantity: 1,
                    price: product.price,
                    productId: product.id
                })
            }).then(() => {
                loadQuantity();
            });
        };

        body.appendChild(name);
        body.appendChild(price);
        body.appendChild(btn);

        card.appendChild(img);
        card.appendChild(body);
        col.appendChild(card);

        document.getElementById("products").appendChild(col);
    });

    /* როცა ჩაიტვირთება პროდუქტები → გაუშვი ანიმაცია */
    revealCards();
});

/* SCROLL ANIMATION */
function revealCards() {
    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        const windowHeight = window.innerHeight;
        const cardTop = card.getBoundingClientRect().top;

        if (cardTop < windowHeight - 100) {
            card.classList.add("show");
        }
    });
}

window.addEventListener("scroll", revealCards);

</script>

</body>
</html>
