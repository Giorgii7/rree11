<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

.title{
text-align:center;
}

.menu{
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:white;
width:220px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
padding:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff0000;
}
    </style>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
<title>Restaurant Menu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">Our Menu</h1>

<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1601924582975-7e3d6c4b4c6a" alt="">
<h3>Pizza</h3>
<p>15₾</p>
<button onclick="addToCart('Pizza',15)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="">
<h3>Burger</h3>
<p>12₾</p>
<button onclick="addToCart('Burger',12)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1525755662778-989d0524087e" alt="">
<h3>Pasta</h3>
<p>10₾</p>
<button onclick="addToCart('Pasta',10)">Add to Cart</button>
</div>

</div>

<h2>Cart</h2>
<ul id="cart"></ul>

<script src="script.js"></script>


<script>
    let cart = []

function addToCart(name,price){

let li = document.createElement("li")
li.textContent = name + " - " + price + "₾"

document.getElementById("cart").appendChild(li)

}
</script>

</body>
</html>
</body>
</html>
